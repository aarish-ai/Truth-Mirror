<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Truth Mirror</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; max-width: 900px; }
    textarea { width: 100%; min-height: 90px; }
    button { margin-top: 0.75rem; padding: 0.5rem 1rem; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-top: 1rem; }
    .muted { color: #666; font-size: 0.95rem; }
    code { background: #f5f5f5; padding: 0.1rem 0.3rem; }
  </style>
</head>
<body>
  <h1>Truth Mirror</h1>
  <p>Submit a claim. The system returns a cautious verdict with evidence and citations.</p>
  <textarea id="claimInput" placeholder="Example: The WHO declared mpox a global health emergency in 2024."></textarea>
  <br>
  <button id="verifyBtn">Verify Claim</button>
  <div id="result" class="card" style="display:none;"></div>

  <script>
    const btn = document.getElementById("verifyBtn");
    const out = document.getElementById("result");

    function renderResult(data) {
      const citations = (data.sub_claims || []).flatMap(sc => sc.evidence || []).map((e, i) =>
        `<li><a href="${e.url_or_id}" target="_blank" rel="noreferrer">${e.source_title}</a> ` +
        `(${e.publisher}, ${e.date}) - stance: <code>${e.stance}</code></li>`
      ).join("");

      const subclaims = (data.sub_claims || []).map(sc =>
        `<li><strong>${sc.text}</strong><br>` +
        `status: <code>${sc.status}</code>, confidence: ${sc.confidence}</li>`
      ).join("");

      out.innerHTML =
        `<h2>Verdict: ${data.final_verdict}</h2>` +
        `<p><strong>Confidence:</strong> ${data.confidence}</p>` +
        `<p><strong>Claim type:</strong> ${data.claim_type}</p>` +
        `<h3>Sub-claims</h3><ul>${subclaims || "<li>None</li>"}</ul>` +
        `<h3>Citations</h3><ul>${citations || "<li>No sources retrieved.</li>"}</ul>` +
        `<p class="muted"><strong>Warnings:</strong> ${(data.warnings || []).join(", ") || "none"}</p>` +
        `<p class="muted"><strong>Missing information:</strong> ${(data.missing_information || []).join("; ") || "none"}</p>`;
      out.style.display = "block";
    }

    btn.addEventListener("click", async () => {
      const claim = document.getElementById("claimInput").value.trim();
      if (!claim) return;
      out.style.display = "block";
      out.textContent = "Verifying claim...";
      const response = await fetch("/api/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ claim })
      });
      const data = await response.json();
      renderResult(data);
    });
  </script>
</body>
</html>
