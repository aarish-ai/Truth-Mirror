<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truth Mirror - Global Verification System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root {
      --bg-color: #0b0f19;
      --panel-bg: #111827;
      --panel-border: #1f2937;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --sidebar-width: 300px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      background-color: var(--panel-bg);
      border-right: 1px solid var(--panel-border);
      display: flex;
      flex-direction: column;
    }
    
    .sidebar-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--panel-border);
    }
    
    .sidebar-header h2 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .history-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .history-item:hover {
      background: rgba(255,255,255,0.08);
      border-color: var(--accent);
    }

    .history-item.active {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.1);
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .top-bar {
      padding: 1.5rem 2rem;
      background: rgba(17, 24, 39, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--panel-border);
      display: flex;
      gap: 1rem;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .search-box {
      flex: 1;
      display: flex;
      gap: 1rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.875rem 1.25rem;
      border-radius: 8px;
      border: 1px solid var(--panel-border);
      background: var(--bg-color);
      color: var(--text-main);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    .btn {
      padding: 0.875rem 1.5rem;
      border-radius: 8px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--panel-border);
      color: var(--text-main);
    }

    .btn-outline:hover {
      border-color: var(--text-muted);
    }

    /* Dashboard Grid */
    .dashboard {
      padding: 2rem;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }

    .panel {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
    }

    .panel-full {
      grid-column: 1 / -1;
    }

    .panel-header {
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-title {
      font-size: 1.125rem;
      font-weight: 600;
      margin: 0;
    }

    /* Panel 1 specific */
    .verdict-box {
      background: rgba(255,255,255,0.03);
      padding: 1.5rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      border-left: 4px solid var(--accent);
    }
    
    .verdict-box h3 { margin: 0 0 0.5rem 0; font-size: 1.5rem; }
    .verdict-box p { margin: 0; color: var(--text-muted); }

    .alerts-container {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
    }
    
    .alert-warning { background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.2); color: #fcd34d; }
    .alert-danger { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #fca5a5; }

    #stackedBarChart { height: 250px; width: 100%; }

    /* Panel 2 specific */
    #networkGraph { height: 450px; width: 100%; border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; background: rgba(0,0,0,0.2); }

    /* Panel 3 specific */
    .hidden-story-item {
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .story-header {
      padding: 1rem 1.5rem;
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
    }

    .story-header:hover {
      background: rgba(255,255,255,0.05);
    }

    .story-content {
      padding: 1.5rem;
      border-top: 1px solid var(--panel-border);
      display: none;
      background: rgba(0,0,0,0.2);
    }

    .story-content.active { display: block; }
    
    .loader {
      display: none;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .tag {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(255,255,255,0.1);
    }
    
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Truth Mirror</h2>
      <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem; margin-bottom: 0;">Global Analysis Engine</p>
    </div>
    <div class="history-list" id="historyList">
      <!-- History items will be injected here -->
      <div class="empty-state" style="padding: 2rem 1rem;">No history yet.</div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="top-bar">
      <div class="search-box">
        <input type="text" id="claimInput" placeholder="Enter a claim to analyze (e.g., 'The WHO declared mpox a global emergency in 2024')" />
        <button class="btn btn-primary" id="verifyBtn">
          <span class="btn-text">Analyze</span>
          <div class="loader" id="verifyLoader"></div>
        </button>
      </div>
      <button class="btn btn-outline" id="exportBtn" disabled>
        Export Report
      </button>
    </div>

    <div id="dashboard" class="dashboard" style="display: none;">
      
      <!-- Panel 1: Verdict & Stacked Bar -->
      <div class="panel">
        <div class="panel-header">
          <h3 class="panel-title">Verdict Summary</h3>
        </div>
        <div id="verdictBox" class="verdict-box">
          <h3 id="verdictTitle">Evaluating...</h3>
          <p id="verdictConfidence">Confidence: --</p>
        </div>
        
        <div style="margin-bottom: 1rem;">
          <h4 style="font-size: 0.9rem; margin-bottom: 0.5rem;">Geographic Perspectives (Stance)</h4>
          <div id="stackedBarChart"></div>
        </div>

        <div class="alerts-container" id="alertsContainer"></div>
      </div>

      <!-- Panel 2: Network Graph -->
      <div class="panel">
        <div class="panel-header">
          <h3 class="panel-title">Evidence Network</h3>
        </div>
        <div id="networkGraph"></div>
      </div>

      <!-- Panel 3: Hidden Story -->
      <div class="panel panel-full">
        <div class="panel-header">
          <h3 class="panel-title">Hidden Stories & Omissions</h3>
          <span class="tag" id="hiddenStoryCount">0 Detected</span>
        </div>
        <div id="hiddenStoryContainer">
          <!-- Collapsible stories will be injected here -->
        </div>
      </div>

    </div>
    
    <div id="initialState" class="empty-state" style="margin: auto;">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5; margin-bottom: 1rem;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <h2>Ready for Analysis</h2>
      <p>Submit a claim above to discover diverse global perspectives.</p>
    </div>

  </main>

  <script>
    // State
    const state = {
      history: [],
      currentResult: null
    };

    // DOM Elements
    const elements = {
      claimInput: document.getElementById("claimInput"),
      verifyBtn: document.getElementById("verifyBtn"),
      verifyLoader: document.getElementById("verifyLoader"),
      btnText: document.querySelector(".btn-text"),
      exportBtn: document.getElementById("exportBtn"),
      dashboard: document.getElementById("dashboard"),
      initialState: document.getElementById("initialState"),
      historyList: document.getElementById("historyList"),
      verdictTitle: document.getElementById("verdictTitle"),
      verdictConfidence: document.getElementById("verdictConfidence"),
      alertsContainer: document.getElementById("alertsContainer"),
      stackedBarChart: document.getElementById("stackedBarChart"),
      networkGraph: document.getElementById("networkGraph"),
      hiddenStoryContainer: document.getElementById("hiddenStoryContainer"),
      hiddenStoryCount: document.getElementById("hiddenStoryCount")
    };

    // Event Listeners
    elements.verifyBtn.addEventListener("click", verifyClaim);
    elements.claimInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") verifyClaim();
    });
    elements.exportBtn.addEventListener("click", exportReport);

    window.addEventListener("resize", () => {
      if (state.currentResult) {
        drawStackedBar(state.currentResult);
        drawNetworkGraph(state.currentResult);
      }
    });

    async function verifyClaim() {
      const claim = elements.claimInput.value.trim();
      if (!claim) return;

      // Loading state
      elements.btnText.style.display = "none";
      elements.verifyLoader.style.display = "block";
      elements.verifyBtn.disabled = true;

      try {
        const res = await fetch("/api/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ claim })
        });
        
        if (!res.ok) throw new Error("Verification failed");
        
        const data = await res.json();
        state.currentResult = data;
        
        // Add to history
        state.history.unshift({ claim: data.original_claim || claim, verdict: data.final_verdict, date: new Date().toLocaleTimeString() });
        renderHistory();
        
        // Render Dashboard
        elements.initialState.style.display = "none";
        elements.dashboard.style.display = "grid";
        elements.exportBtn.disabled = false;
        
        renderVerdict(data);
        drawStackedBar(data);
        drawNetworkGraph(data);
        renderHiddenStories(data);
        
      } catch (err) {
        alert("Error verifying claim: " + err.message);
      } finally {
        elements.btnText.style.display = "block";
        elements.verifyLoader.style.display = "none";
        elements.verifyBtn.disabled = false;
      }
    }

    function renderHistory() {
      if (state.history.length === 0) return;
      elements.historyList.innerHTML = state.history.map((h, i) => `
        <div class="history-item ${i === 0 ? 'active' : ''}" onclick="loadHistoryItem(${i})">
          <div style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.25rem;">${h.date}</div>
          <div style="font-weight: 500; font-size: 0.95rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis;">${h.claim}</div>
          <div class="tag" style="margin-top: 0.5rem; background: rgba(59, 130, 246, 0.2); color: #93c5fd;">${h.verdict || 'Unknown'}</div>
        </div>
      `).join("");
    }

    function loadHistoryItem(index) {
      document.querySelectorAll('.history-item').forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });
    }

    function renderVerdict(data) {
      elements.verdictTitle.textContent = data.final_verdict || "Analysis Complete";
      
      // Determine color
      const verdictLower = (data.final_verdict || "").toLowerCase();
      if (verdictLower.includes('supported') && !verdictLower.includes('un')) {
        elements.verdictTitle.style.color = 'var(--success)';
        elements.verdictTitle.parentElement.style.borderLeftColor = 'var(--success)';
      } else if (verdictLower.includes('contradicted') || verdictLower.includes('unsupported')) {
        elements.verdictTitle.style.color = 'var(--danger)';
        elements.verdictTitle.parentElement.style.borderLeftColor = 'var(--danger)';
      } else {
        elements.verdictTitle.style.color = 'var(--warning)';
        elements.verdictTitle.parentElement.style.borderLeftColor = 'var(--warning)';
      }

      elements.verdictConfidence.textContent = `Confidence: ${((data.confidence || 0) * 100).toFixed(1)}%`;

      // Alerts
      let alertsHtml = '';
      if (data.warnings && data.warnings.length) {
        alertsHtml += data.warnings.map(w => `<div class="alert alert-warning">⚠️ ${w}</div>`).join('');
      }
      if (data.missing_information && data.missing_information.length) {
        alertsHtml += data.missing_information.map(m => `<div class="alert alert-danger">ℹ️ Missing: ${m}</div>`).join('');
      }
      if (!alertsHtml) {
        alertsHtml = `<div class="alert" style="background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); color: #6ee7b7;">✅ No warnings detected.</div>`;
      }
      elements.alertsContainer.innerHTML = alertsHtml;
    }

    function drawStackedBar(data) {
      const containerId = "stackedBarChart";
      const container = d3.select("#" + containerId);
      container.selectAll("*").remove();
      
      const width = document.getElementById(containerId).clientWidth;
      const height = 250;
      
      if (!data.evidence_by_region || Object.keys(data.evidence_by_region).length === 0) {
        container.append("div").attr("class", "empty-state").style("padding", "2rem 0").text("No geographic evidence available.");
        return;
      }
      
      const regions = Object.keys(data.evidence_by_region);
      const stances = ["supports", "contradicts", "neutral", "insufficient"];
      
      const chartData = regions.map(region => {
        const row = { region };
        stances.forEach(s => row[s] = 0);
        data.evidence_by_region[region].forEach(ev => {
          if (stances.includes(ev.stance)) {
            row[ev.stance]++;
          } else {
            row["insufficient"]++;
          }
        });
        return row;
      });

      const color = d3.scaleOrdinal()
        .domain(stances)
        .range(["#10b981", "#ef4444", "#9ca3af", "#4b5563"]);

      const svg = container.append("svg")
        .attr("width", width)
        .attr("height", height);
        
      const margin = {top: 20, right: 120, bottom: 40, left: 40};
      const innerWidth = width - margin.left - margin.right;
      const innerHeight = height - margin.top - margin.bottom;

      const series = d3.stack().keys(stances)(chartData);
      
      const x = d3.scaleBand()
        .domain(chartData.map(d => d.region))
        .range([0, innerWidth])
        .padding(0.3);
        
      const maxVal = d3.max(series, d => d3.max(d, d => d[1]));
      const y = d3.scaleLinear()
        .domain([0, maxVal || 1]).nice()
        .range([innerHeight, 0]);

      const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);
      
      g.append("g")
        .selectAll("g")
        .data(series)
        .join("g")
        .attr("fill", d => color(d.key))
        .selectAll("rect")
        .data(d => d)
        .join("rect")
        .attr("x", d => x(d.data.region))
        .attr("y", d => y(d[1]))
        .attr("height", d => y(d[0]) - y(d[1]))
        .attr("width", x.bandwidth())
        .append("title")
        .text(function() {
          const parentData = d3.select(this.parentNode).datum();
          return `${parentData.key}: ${d3.select(this).datum()[1] - d3.select(this).datum()[0]}`;
        });

      // X Axis
      g.append("g")
        .attr("transform", `translate(0,${innerHeight})`)
        .call(d3.axisBottom(x))
        .selectAll("text")
        .style("fill", "var(--text-main)")
        .style("font-family", "Inter")
        .style("font-size", "12px");
        
      g.selectAll(".domain, .tick line").attr("stroke", "var(--panel-border)");

      // Y Axis
      g.append("g")
        .call(d3.axisLeft(y).ticks(Math.max(2, maxVal)).tickFormat(d3.format("d")))
        .selectAll("text")
        .style("fill", "var(--text-main)")
        .style("font-family", "Inter");
        
      // Legend
      const legend = svg.append("g")
        .attr("font-family", "Inter")
        .attr("font-size", 12)
        .attr("text-anchor", "start")
        .selectAll("g")
        .data(stances.slice().reverse())
        .join("g")
        .attr("transform", (d, i) => `translate(${width - margin.right + 20},${margin.top + i * 20})`);

      legend.append("rect")
        .attr("x", 0)
        .attr("width", 15)
        .attr("height", 15)
        .attr("fill", color);

      legend.append("text")
        .attr("x", 24)
        .attr("y", 9.5)
        .attr("dy", "0.32em")
        .style("fill", "var(--text-main)")
        .text(d => d.charAt(0).toUpperCase() + d.slice(1));
    }

    function drawNetworkGraph(data) {
      const containerId = "networkGraph";
      const width = document.getElementById(containerId).clientWidth;
      const height = 450;
      
      const svg = d3.select("#" + containerId).selectAll("*").remove();
      
      const nodes = [];
      const links = [];
      
      nodes.push({ id: "claim", label: "Main Claim", group: "claim", radius: 25 });
      
      if (data.sub_claims) {
        data.sub_claims.forEach((sc, i) => {
          const scId = "sc_" + i;
          nodes.push({ id: scId, label: sc.text, group: "subclaim", radius: 18 });
          links.push({ source: "claim", target: scId });
          
          if (sc.evidence) {
            sc.evidence.forEach((ev, j) => {
              const evId = "ev_" + i + "_" + j;
              nodes.push({ 
                id: evId, 
                label: ev.source_title, 
                group: "evidence", 
                stance: ev.stance, 
                radius: 12 
              });
              links.push({ source: scId, target: evId });
            });
          }
        });
      }
      
      if (nodes.length === 1) {
        d3.select("#" + containerId).append("div").attr("class", "empty-state").style("margin-top", "100px").text("Not enough data to build network.");
        return;
      }

      const svgContainer = d3.select("#" + containerId).append("svg")
        .attr("width", width)
        .attr("height", height);

      const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(60))
        .force("charge", d3.forceManyBody().strength(-200))
        .force("center", d3.forceCenter(width / 2, height / 2))
        .force("collide", d3.forceCollide().radius(d => d.radius + 5).iterations(2));

      const link = svgContainer.append("g")
        .attr("stroke", "rgba(255,255,255,0.2)")
        .selectAll("line")
        .data(links)
        .join("line")
        .attr("stroke-width", 1.5);

      const colorStance = {
        "supports": "#10b981",
        "contradicts": "#ef4444",
        "neutral": "#9ca3af",
        "insufficient": "#4b5563"
      };

      const node = svgContainer.append("g")
        .attr("stroke", "#1f2937")
        .attr("stroke-width", 2)
        .selectAll("circle")
        .data(nodes)
        .join("circle")
        .attr("r", d => d.radius)
        .attr("fill", d => {
          if (d.group === "claim") return "#3b82f6";
          if (d.group === "subclaim") return "#8b5cf6";
          return colorStance[d.stance] || "#6b7280";
        })
        .call(drag(simulation));

      node.append("title")
        .text(d => d.label);

      simulation.on("tick", () => {
        link
          .attr("x1", d => d.source.x)
          .attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x)
          .attr("y2", d => d.target.y);

        node
          .attr("cx", d => d.x = Math.max(d.radius, Math.min(width - d.radius, d.x)))
          .attr("cy", d => d.y = Math.max(d.radius, Math.min(height - d.radius, d.y)));
      });

      function drag(simulation) {
        function dragstarted(event) {
          if (!event.active) simulation.alphaTarget(0.3).restart();
          event.subject.fx = event.subject.x;
          event.subject.fy = event.subject.y;
        }
        function dragged(event) {
          event.subject.fx = event.x;
          event.subject.fy = event.y;
        }
        function dragended(event) {
          if (!event.active) simulation.alphaTarget(0);
          event.subject.fx = null;
          event.subject.fy = null;
        }
        return d3.drag()
          .on("start", dragstarted)
          .on("drag", dragged)
          .on("end", dragended);
      }
    }

    function renderHiddenStories(data) {
      elements.hiddenStoryContainer.innerHTML = "";
      const stories = data.hidden_story_items || [];
      elements.hiddenStoryCount.textContent = `${stories.length} Detected`;
      
      if (stories.length === 0) {
        elements.hiddenStoryContainer.innerHTML = `<div class="empty-state">No hidden stories or significant omissions detected.</div>`;
        return;
      }

      stories.forEach((story, i) => {
        const item = document.createElement('div');
        item.className = 'hidden-story-item';
        
        item.innerHTML = `
          <div class="story-header" onclick="this.nextElementSibling.classList.toggle('active')">
            <div style="font-weight: 600; font-size: 1.05rem;">${story.source_title || 'Unknown Source'}</div>
            <div style="color: var(--text-muted); font-size: 0.9rem;">${story.publisher || ''} • ${story.perspective_label || 'Unknown Perspective'}</div>
          </div>
          <div class="story-content">
            <p style="margin-top: 0; line-height: 1.6; color: #d1d5db;">${story.excerpt || 'No excerpt available.'}</p>
            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
              <span class="tag">Type: ${story.source_type}</span>
              <span class="tag">Stance: ${story.stance}</span>
              ${story.url_or_id ? `<a href="${story.url_or_id}" target="_blank" style="color: var(--accent); text-decoration: none; font-size: 0.9rem;">View Source ↗</a>` : ''}
            </div>
          </div>
        `;
        elements.hiddenStoryContainer.appendChild(item);
      });
    }

    function exportReport() {
      if (!state.currentResult) return;
      const jsonStr = JSON.stringify(state.currentResult, null, 2);
      const blob = new Blob([jsonStr], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "truth_mirror_report.json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

  </script>
</body>
</html>
